name: CI/CD Pipeline

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - staging
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 🔹 BACKEND IMAGE
      - name: Build Backend Image
        run: docker build -t ghcr.io/405found404/backend:${{ github.ref_name }} ./backend

      - name: Push Backend Image
        run: docker push ghcr.io/405found404/backend:${{ github.ref_name }}

      # 🔹 FRONTEND IMAGE
      - name: Build Frontend Image
        run: docker build -t ghcr.io/405found404/frontend:${{ github.ref_name }} ./frontend

      - name: Push Frontend Image
        run: docker push ghcr.io/405found404/frontend:${{ github.ref_name }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to staging
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.INSTANCE_ID_STAGING }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "docker pull ghcr.io/405found404/backend:staging",
              "docker pull ghcr.io/405found404/frontend:staging",

              "docker stop backend || true",
              "docker rm backend || true",
              "docker run -d -p 3000:3000 --name backend ghcr.io/405found404/backend:staging",

              "docker stop frontend || true",
              "docker rm frontend || true",
              "docker run -d -p 80:80 --name frontend ghcr.io/405found404/frontend:staging"
            ]'

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to production
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.INSTANCE_ID_PROD }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "docker pull ghcr.io/405found404/backend:main",
              "docker pull ghcr.io/405found404/frontend:main",

              "docker stop backend || true",
              "docker rm backend || true",
              "docker run -d -p 3000:3000 --name backend ghcr.io/405found404/backend:main",

              "docker stop frontend || true",
              "docker rm frontend || true",
              "docker run -d -p 80:80 --name frontend ghcr.io/405found404/frontend:main"
            ]'
